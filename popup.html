<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DisBoost</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      padding: 20px;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #86868b;
      margin-top: 2px;
    }

    /* 状态指示器 */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .status-dot.inactive {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }

    .status-text {
      font-size: 12px;
      color: #a1a1aa;
    }

    /* 功能列表 */
    .features {
      margin-bottom: 16px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
      color: #d4d4d8;
    }

    .feature-icon {
      font-size: 14px;
      opacity: 0.8;
    }

    /* 设置区域 */
    .settings {
      margin-bottom: 16px;
    }

    .settings-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #52525b;
      margin-bottom: 10px;
    }

    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .setting:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .setting-label {
      font-size: 13px;
      color: #d4d4d8;
    }

    /* 开关按钮 */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #3f3f46;
      transition: 0.2s;
      border-radius: 20px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background: #71717a;
      transition: 0.2s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background: #3b82f6;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
      background: white;
    }

    /* 底部按钮 */
    .footer {
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: none;
      border-radius: 8px;
      color: #f5f5f7;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .version {
      text-align: center;
      font-size: 10px;
      color: #52525b;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <div class="title">DisBoost</div>
        <div class="subtitle">Discourse Boost 回复增强</div>
      </div>
    </header>

    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">检测中...</span>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">💬</span>
        <span>一键回复 Boost</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📋</span>
        <span>自动引用内容</span>
      </div>
      <div class="feature">
        <span class="feature-icon">@</span>
        <span>提及原作者</span>
      </div>
    </div>

    <div class="settings">
      <div class="settings-title">设置</div>
      <div class="setting" data-setting="enabled">
        <span class="setting-label">启用插件</span>
        <label class="toggle">
          <input type="checkbox" id="enablePlugin" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting" data-setting="autoQuote">
        <span class="setting-label">自动引用</span>
        <label class="toggle">
          <input type="checkbox" id="autoQuote" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="footer">
      <button id="refreshBtn" class="btn">刷新页面</button>
      <div class="version">v1.0.0</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
